<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>嘉義文化加一串 · 集章地圖</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --orange:#E8900A; --dark:#1C1C1C; --cream:#FFF8EE;
  --A:#E05A5A; --B:#7B68EE; --C:#3AAA7A; --D:#E8900A;
}
html,body { height:100%; background:var(--dark); font-family:'Noto Sans TC',sans-serif; overflow:hidden; }

/* ── TOP BAR ── */
.topbar {
  position:fixed; top:0; left:0; right:0; height:56px;
  background:var(--dark); display:flex; align-items:center;
  justify-content:space-between; padding:0 16px; z-index:50;
  border-bottom:2px solid rgba(255,255,255,0.08);
}
.topbar-title { font-size:15px; font-weight:900; color:#fff; }
.topbar-title span { color:var(--orange); }
.progress-wrap { display:flex; align-items:center; gap:8px; }
.progress-track { width:80px; height:6px; background:rgba(255,255,255,0.15); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:var(--orange); border-radius:3px; transition:width 0.5s ease; width:0%; }
.progress-count { font-size:12px; font-weight:700; color:rgba(255,255,255,0.6); white-space:nowrap; }

/* ── FILTER TABS ── */
.filter-bar {
  position:fixed; top:56px; left:0; right:0; height:44px;
  background:var(--dark); display:flex; align-items:center;
  gap:6px; padding:0 14px; z-index:50; overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.filter-bar::-webkit-scrollbar { display:none; }
.ftab {
  flex-shrink:0; height:28px; padding:0 12px; border-radius:14px;
  font-size:12px; font-weight:700; font-family:inherit;
  border:1.5px solid rgba(255,255,255,0.18); background:transparent;
  color:rgba(255,255,255,0.55); cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.ftab.active,.ftab:hover { color:#fff; border-color:transparent; }
.ftab[data-cat="all"].active { background:rgba(255,255,255,0.15); }
.ftab[data-cat="A"].active { background:var(--A); }
.ftab[data-cat="B"].active { background:var(--B); }
.ftab[data-cat="C"].active { background:var(--C); }
.ftab[data-cat="D"].active { background:var(--D); }

/* ── MAP ── */
.map-area { position:fixed; top:100px; left:0; right:0; bottom:80px; overflow:hidden; touch-action:none; }
.map-canvas { position:absolute; transform-origin:0 0; cursor:grab; user-select:none; }
.map-canvas:active { cursor:grabbing; }
.map-img { display:block; width:900px; pointer-events:none; }

/* ── PINS ── */
.pin { position:absolute; transform:translate(-50%,-100%); cursor:pointer; z-index:10; transition:transform 0.15s,filter 0.2s; }
.pin:hover { transform:translate(-50%,-100%) scale(1.2); }
.pin:active { transform:translate(-50%,-100%) scale(0.95); }
.pin-body {
  width:32px; height:32px; border-radius:50% 50% 50% 0; transform:rotate(-45deg);
  border:2.5px solid var(--dark); display:flex; align-items:center; justify-content:center;
  box-shadow:2px 2px 6px rgba(0,0,0,0.35); position:relative; transition:background 0.3s;
}
.pin-body::after { content:''; position:absolute; inset:3px; border-radius:50%; background:rgba(255,255,255,0.25); }
.pin-icon { transform:rotate(45deg); font-size:13px; position:relative; z-index:1; }
.pin[data-cat="A"] .pin-body { background:var(--A); }
.pin[data-cat="B"] .pin-body { background:var(--B); }
.pin[data-cat="C"] .pin-body { background:var(--C); }
.pin[data-cat="D"] .pin-body { background:var(--D); }
.pin.locked { filter:saturate(0) opacity(0.55); }
.pin.locked .pin-body::before { content:'🔒'; position:absolute; font-size:9px; bottom:-3px; right:-3px; transform:rotate(45deg); z-index:2; }
.pin.unlocked .pin-body { box-shadow:0 0 0 4px rgba(255,255,255,0.3),2px 2px 8px rgba(0,0,0,0.4); }
.pin-label { position:absolute; top:36px; left:50%; transform:translateX(-50%); background:var(--dark); color:#fff; font-size:9px; font-weight:700; white-space:nowrap; padding:2px 5px; border-radius:4px; pointer-events:none; opacity:0; transition:opacity 0.2s; }
.pin:hover .pin-label { opacity:1; }

/* ── TRAY ── */
.tray { position:fixed; bottom:0; left:0; right:0; height:80px; background:var(--dark); border-top:2px solid rgba(255,255,255,0.08); display:flex; align-items:center; z-index:50; overflow-x:auto; scrollbar-width:none; padding:0 12px; }
.tray::-webkit-scrollbar { display:none; }
.tray-section { display:flex; align-items:center; gap:4px; flex-shrink:0; padding:0 8px; border-right:1px solid rgba(255,255,255,0.08); }
.tray-section:last-child { border-right:none; }
.tray-section-label { font-size:9px; font-weight:700; color:rgba(255,255,255,0.3); writing-mode:vertical-rl; letter-spacing:1px; margin-right:2px; }
.tray-chip { width:34px; height:34px; border-radius:8px; background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:16px; filter:grayscale(1) opacity(0.3); transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1); flex-shrink:0; }
.tray-chip.collected { filter:none; border-color:transparent; transform:scale(1.08); }
.tray-chip[data-cat="A"].collected { background:rgba(224,90,90,0.2); }
.tray-chip[data-cat="B"].collected { background:rgba(123,104,238,0.2); }
.tray-chip[data-cat="C"].collected { background:rgba(58,170,122,0.2); }
.tray-chip[data-cat="D"].collected { background:rgba(232,144,10,0.2); }

/* ── MODAL ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; align-items:flex-end; justify-content:center; }
.overlay.active { display:flex; }
.modal { background:var(--cream); border-radius:24px 24px 0 0; width:100%; max-width:480px; padding:20px 20px 36px; animation:slideUp 0.32s cubic-bezier(0.34,1.4,0.64,1); max-height:85vh; overflow-y:auto; }
@keyframes slideUp { from{transform:translateY(110%)} to{transform:translateY(0)} }
.modal-handle { width:36px; height:4px; background:rgba(0,0,0,0.15); border-radius:2px; margin:0 auto 16px; }
.cat-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; color:#fff; margin-bottom:6px; }
.modal-name { font-size:22px; font-weight:900; color:var(--dark); margin-bottom:2px; }
.modal-addr { font-size:12px; color:#888; margin-bottom:14px; }
.item-card { border-radius:16px; border:2px solid var(--dark); padding:14px; display:flex; align-items:center; gap:12px; margin-bottom:14px; background:#fff; }
.item-big { font-size:40px; line-height:1; transition:filter 0.4s; }
.item-card.locked .item-big { filter:grayscale(1) opacity(0.35); }
.item-meta h3 { font-size:15px; font-weight:900; color:var(--dark); }
.item-meta p { font-size:11px; color:#888; margin-top:2px; }
.item-lock { margin-left:auto; font-size:20px; }
.stamp-info { background:rgba(232,144,10,0.12); border:1.5px solid rgba(232,144,10,0.3); border-radius:12px; padding:10px 14px; margin-bottom:14px; display:flex; flex-direction:column; gap:4px; }
.stamp-row { font-size:12px; font-weight:700; color:#7a4f00; line-height:1.5; }
.q-label { font-size:10px; font-weight:700; color:#aaa; letter-spacing:1px; margin-bottom:6px; }
.q-text { font-size:14px; font-weight:700; color:var(--dark); line-height:1.6; background:rgba(0,0,0,0.04); border-radius:12px; padding:12px 14px; margin-bottom:12px; white-space:pre-line; }
.ans-row { display:flex; gap:8px; margin-bottom:8px; }
.ans-input { flex:1; border:2px solid var(--dark); border-radius:12px; padding:10px 14px; font-size:15px; font-weight:700; font-family:inherit; background:#fff; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
.ans-input:focus { border-color:var(--C); box-shadow:0 0 0 3px rgba(58,170,122,0.2); }
.ans-input.wrong { border-color:var(--A); animation:shake 0.35s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
.submit-btn { background:var(--dark); color:#fff; border:none; border-radius:12px; padding:10px 16px; font-size:13px; font-weight:900; font-family:inherit; cursor:pointer; transition:opacity 0.15s,transform 0.15s; white-space:nowrap; }
.submit-btn:active { transform:scale(0.95); }
.feedback { font-size:12px; font-weight:700; min-height:18px; padding:0 2px; }
.feedback.err { color:var(--A); }
.feedback.hint { color:#888; }
.success-view { display:none; flex-direction:column; align-items:center; text-align:center; padding:8px 0 4px; gap:6px; }
.success-view.show { display:flex; }
.success-emoji { font-size:64px; animation:pop 0.5s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.success-view h2 { font-size:20px; font-weight:900; color:var(--dark); }
.success-view p { font-size:12px; color:#888; }
.done-btn { margin-top:10px; background:var(--dark); color:#fff; border:none; border-radius:14px; padding:12px 32px; font-size:14px; font-weight:900; font-family:inherit; cursor:pointer; }
.done-view { display:none; flex-direction:column; align-items:center; text-align:center; gap:6px; padding:8px 0; }
.done-view.show { display:flex; }
.done-view .big { font-size:48px; }
.done-view h2 { font-size:18px; font-weight:900; color:var(--dark); }
.done-view p { font-size:12px; color:#888; }

/* zoom */
.zoom-hint { position:fixed; bottom:90px; right:14px; display:flex; flex-direction:column; gap:6px; z-index:60; }
.zoom-btn { width:44px; height:44px; border-radius:12px; background:rgba(30,30,30,0.85); border:1.5px solid rgba(255,255,255,0.2); color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-family:inherit; backdrop-filter:blur(8px); box-shadow:0 2px 8px rgba(0,0,0,0.3); transition:background 0.15s, transform 0.1s; }
.zoom-btn:active { transform:scale(0.92); background:rgba(255,255,255,0.15); }

/* loading */
.loading-screen { position:fixed; inset:0; background:var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; gap:16px; transition:opacity 0.5s; }
.loading-screen.hide { opacity:0; pointer-events:none; }
.loading-title { font-size:20px; font-weight:900; color:#fff; }
.loading-title span { color:var(--orange); }
.loading-sub { font-size:13px; color:rgba(255,255,255,0.4); }
.spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* confetti */
.conf { position:fixed; width:8px; height:8px; border-radius:2px; z-index:999; pointer-events:none; animation:confFall 1s ease-in forwards; }
@keyframes confFall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(540deg);opacity:0} }
</style>
</head>

<!-- Loading screen -->

</div>

        <div class="stamp-row" id="mStampTime"></div>
      </div>

        <div class="item-meta"><h3 id="mItemName"></h3><p id="mItemDesc">解開謎題即可獲得</p></div>
        <div class="item-lock" id="mLock">🔒</div>

      <div class="q-label">✦ 到現場才能解開的謎題</div>
      <div class="q-text" id="mQuestion"></div>
      <div class="ans-row">
        <input class="ans-input" id="ansInput" type="text" placeholder="輸入答案…" autocomplete="off" onkeydown="if(event.key==='Enter')checkAns()">

      </div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="success-view" id="successView">
      <div class="success-emoji" id="sEmoji"></div>

      <p id="sItemName"></p>

      <h2>已解鎖</h2>

        <div class="stamp-row" id="doneStampTime"></div>
      </div><br>
      <button class="done-btn" onclick="closeModal()">關閉</button>
    </div>
  </div>
</div>

// ═══════════════════════════════════════
// 狀態
// ═══════════════════════════════════════
let unlocked = [];
let currentId = null;
let attempts = 0;
let currentCat = 'all';
let userId = null;
let scale = 1, tx = 0, ty = 0;
let dragging = false, startX, startY, startTx, startTy;

// ═══════════════════════════════════════
// 初始化：從網址取 userId，載入進度
// ═══════════════════════════════════════
async function init() {
  // 從網址參數取 userId
  const params = new URLSearchParams(window.location.search);
  userId = params.get('userId');

  // 檢查是否有即時解鎖（從 unlock-redirect 過來）
  const justUnlocked = params.get('unlocked');

  if (userId) {
    document.getElementById('loadingMsg').textContent = '載入你的解鎖進度…';
    try {
      const res = await fetch(`${API_BASE}/progress/${encodeURIComponent(userId)}`);
      const data = await res.json();
      unlocked = data.unlocked || [];
    } catch (e) {
      console.error('載入進度失敗', e);
      // 使用本地備份
      unlocked = JSON.parse(localStorage.getItem('cy_unlocked') || '[]');
    }
  } else {
    document.getElementById('loadingMsg').textContent = '從本地載入進度…';
    unlocked = JSON.parse(localStorage.getItem('cy_unlocked') || '[]');
  }

  buildPins();
  buildTray();
  unlocked.forEach(id => applyUnlocked(id, false));
  updateProgress();
  fitMap();
  setupPan();

  // 如果有即時解鎖，存入本地並顯示動畫
  if (justUnlocked && !unlocked.includes(justUnlocked)) {
    unlocked.push(justUnlocked);
    localStorage.setItem('cy_unlocked', JSON.stringify(unlocked));
    applyUnlocked(justUnlocked);
    updateProgress();
    setTimeout(() => openStation(justUnlocked), 800);
  }

  // 隱藏 loading
  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('hide');
    setTimeout(() => document.getElementById('loadingScreen').remove(), 600);
  }, 500);
}

// ═══════════════════════════════════════
// 建立 pins
// ═══════════════════════════════════════
function buildPins() {
  const canvas = document.getElementById('mapCanvas');
  STATIONS.forEach(s => {
    const pin = document.createElement('div');
    pin.className = 'pin locked';
    pin.dataset.cat = s.cat;
    pin.dataset.id = s.id;
    pin.id = 'pin-' + s.id;
    pin.style.left = s.x + '%';
    pin.style.top  = s.y + '%';
    pin.innerHTML = `<div class="pin-body"><span class="pin-icon">${s.emoji}</span></div><div class="pin-label">${s.id} ${s.name}</div>`;
    pin.addEventListener('click', e => { e.stopPropagation(); if (!dragging) openStation(s.id); });
    canvas.appendChild(pin);
  });
}

// ═══════════════════════════════════════
// 建立 tray
// ═══════════════════════════════════════
function buildTray() {
  const tray = document.getElementById('tray');
  const cats = ['A','B','C','D'];
  const labels = { A:'工藝串', B:'展演串', C:'行動串', D:'社造串' };
  cats.forEach(cat => {
    const sec = document.createElement('div');
    sec.className = 'tray-section';
    const label = document.createElement('div');
    label.className = 'tray-section-label';
    label.textContent = labels[cat];
    sec.appendChild(label);
    STATIONS.filter(s => s.cat === cat).forEach(s => {
      const chip = document.createElement('div');
      chip.className = 'tray-chip';
      chip.dataset.cat = cat;
      chip.id = 'chip-' + s.id;
      chip.textContent = s.emoji;
      sec.appendChild(chip);
    });
    tray.appendChild(sec);
  });
}

// ═══════════════════════════════════════
// 解鎖
// ═══════════════════════════════════════
function applyUnlocked(id) {
  const pin  = document.getElementById('pin-' + id);
  const chip = document.getElementById('chip-' + id);
  if (pin)  { pin.classList.remove('locked'); pin.classList.add('unlocked'); }
  if (chip) chip.classList.add('collected');
}

function updateProgress() {
  const n = unlocked.length;
  const t = STATIONS.length;
  document.getElementById('progFill').style.width = (n/t*100) + '%';
  document.getElementById('progCount').textContent = n + '/' + t;
}

// ═══════════════════════════════════════
// 篩選
// ═══════════════════════════════════════
function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.ftab').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.querySelectorAll('.pin').forEach(pin => {
    const show = cat === 'all' || pin.dataset.cat === cat;
    pin.style.opacity = show ? '1' : '0.15';
    pin.style.pointerEvents = show ? 'auto' : 'none';
  });
}

// ═══════════════════════════════════════
// Modal
// ═══════════════════════════════════════
function openStation(id) {
  const s = STATIONS.find(x => x.id === id);
  if (!s) return;
  currentId = id;
  attempts = 0;
  const isUnlocked = unlocked.includes(id);

  document.getElementById('qView').style.display = 'block';
  document.getElementById('successView').classList.remove('show');
  document.getElementById('doneView').classList.remove('show');
  document.getElementById('feedback').textContent = '';
  document.getElementById('ansInput').value = '';
  document.getElementById('ansInput').classList.remove('wrong');

  const catNames = { A:'工藝串', B:'展演串', C:'行動串', D:'社造串' };
  const catColors = { A:'var(--A)', B:'var(--B)', C:'var(--C)', D:'var(--D)' };
  const badge = document.getElementById('mBadge');
  badge.textContent = s.id + ' · ' + catNames[s.cat];
  badge.style.background = catColors[s.cat];

  document.getElementById('mName').textContent = s.name;
  document.getElementById('mAddr').textContent = '📍 ' + s.addr;

  // 集點資訊
  const stampInfo = document.getElementById('mStampInfo');
  if (s.stampAddr || s.stampTime) {
    document.getElementById('mStampAddr').textContent = '📌 ' + (s.stampAddr || '');
    document.getElementById('mStampTime').textContent = '🕐 ' + (s.stampTime || '');
    stampInfo.style.display = 'flex';
  } else {
    stampInfo.style.display = 'none';
  }
  document.getElementById('mEmoji').textContent = s.emoji;
  document.getElementById('mItemName').textContent = s.item;
  document.getElementById('mQuestion').textContent = s.q;
  document.getElementById('sEmoji').textContent = s.emoji;
  document.getElementById('sItemName').textContent = s.item;
  document.getElementById('doneItemName').textContent = '「' + s.item + '」已在道具欄';

  if (isUnlocked) {
    document.getElementById('qView').style.display = 'none';
    document.getElementById('mItemCard').classList.remove('locked');
    document.getElementById('mLock').textContent = '✅';
    document.getElementById('doneView').classList.add('show');
    // 已解鎖畫面也顯示集點資訊
    const doneStamp = document.getElementById('doneStampInfo');
    if (s.stampAddr || s.stampTime) {
      document.getElementById('doneStampAddr').textContent = '📌 ' + (s.stampAddr || '');
      document.getElementById('doneStampTime').textContent = '🕐 ' + (s.stampTime || '');
      doneStamp.style.display = 'flex';
    } else {
      doneStamp.style.display = 'none';
    }
  } else {
    document.getElementById('mItemCard').classList.add('locked');
    document.getElementById('mLock').textContent = '🔒';
  }

  document.getElementById('overlay').classList.add('active');
  setTimeout(() => document.getElementById('ansInput').focus(), 350);
}

function checkAns() {
  const s = STATIONS.find(x => x.id === currentId);
  const input = document.getElementById('ansInput');
  const fb = document.getElementById('feedback');
  const val = input.value.trim();
  if (!val) return;

  const ok = val.includes(s.ans) || s.ans.includes(val);

  if (ok) {
    if (!unlocked.includes(currentId)) {
      unlocked.push(currentId);
      // 存本地備份
      localStorage.setItem('cy_unlocked', JSON.stringify(unlocked));
      applyUnlocked(currentId);
      updateProgress();
    }
    document.getElementById('qView').style.display = 'none';
    document.getElementById('successView').classList.add('show');
  } else {
    attempts++;
    input.classList.remove('wrong');
    void input.offsetWidth;
    input.classList.add('wrong');
    input.value = '';
    fb.textContent = attempts >= 2 ? '再想想！到現場仔細找找線索 🔍' : '答案不對，再試一次！';
    fb.className = attempts >= 2 ? 'feedback hint' : 'feedback err';
  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('active');
  currentId = null;
}

function handleBg(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

// ═══════════════════════════════════════
// Pan & Zoom（優化版）
// ═══════════════════════════════════════
const MIN_SCALE = 0.3;
const MAX_SCALE = 4;
const IMG_W = 900;
const IMG_H = 614; // 900 * (3822/5602)

function fitMap() {
  const area = document.getElementById('mapArea');
  const aw = area.offsetWidth;
  const ah = area.offsetHeight;
  scale = Math.min(aw / IMG_W, ah / IMG_H) * 0.95;
  tx = (aw - IMG_W * scale) / 2;
  ty = (ah - IMG_H * scale) / 2;
  applyTransform();
}

function clampTransform() {
  const area = document.getElementById('mapArea');
  const aw = area.offsetWidth;
  const ah = area.offsetHeight;
  const mapW = IMG_W * scale;
  const mapH = IMG_H * scale;
  // 讓地圖不能拖到完全離開畫面
  const pad = 80;
  tx = Math.min(aw - pad, Math.max(pad - mapW, tx));
  ty = Math.min(ah - pad, Math.max(pad - mapH, ty));
}

function applyTransform() {
  document.getElementById('mapCanvas').style.transform =
    `translate(${tx}px,${ty}px) scale(${scale})`;
}

function zoomAt(cx, cy, factor) {
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
  const ratio = newScale / scale;
  tx = cx - (cx - tx) * ratio;
  ty = cy - (cy - ty) * ratio;
  scale = newScale;
  clampTransform();
  applyTransform();
}

function zoom(f) {
  const area = document.getElementById('mapArea');
  zoomAt(area.offsetWidth / 2, area.offsetHeight / 2, f);
}

function setupPan() {
  const area = document.getElementById('mapArea');
  let lastDist = 0;
  let pinching = false;
  let lastMidX = 0, lastMidY = 0;
  let moved = false;

  // ── Mouse ──
  area.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true;
    moved = false;
    startX = e.clientX; startY = e.clientY;
    startTx = tx; startTy = ty;
    area.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
    tx = startTx + dx;
    ty = startTy + dy;
    clampTransform();
    applyTransform();
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    area.style.cursor = 'grab';
    setTimeout(() => { dragging = false; }, 50);
  });

  // ── Wheel zoom（電腦）──
  area.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = area.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.15 : 0.87;
    zoomAt(cx, cy, factor);
  }, { passive: false });

  // ── Touch（手機）──
  area.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      pinching = false;
      dragging = true;
      moved = false;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startTx = tx; startTy = ty;
    } else if (e.touches.length === 2) {
      pinching = true;
      dragging = false;
      const t1 = e.touches[0], t2 = e.touches[1];
      lastDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      lastMidX = (t1.clientX + t2.clientX) / 2;
      lastMidY = (t1.clientY + t2.clientY) / 2;
    }
  }, { passive: true });

  area.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && dragging && !pinching) {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
      tx = startTx + dx;
      ty = startTy + dy;
      clampTransform();
      applyTransform();
    } else if (e.touches.length === 2) {
      pinching = true;
      const t1 = e.touches[0], t2 = e.touches[1];
      const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      const midX = (t1.clientX + t2.clientX) / 2;
      const midY = (t1.clientY + t2.clientY) / 2;
      const rect = area.getBoundingClientRect();

      if (lastDist > 0) {
        const factor = dist / lastDist;
        zoomAt(midX - rect.left, midY - rect.top, factor);
        // 也支援雙指平移
        tx += midX - lastMidX;
        ty += midY - lastMidY;
        clampTransform();
        applyTransform();
      }
      lastDist = dist;
      lastMidX = midX;
      lastMidY = midY;
    }
  }, { passive: false });

  area.addEventListener('touchend', e => {
    if (e.touches.length < 2) {
      lastDist = 0;
      pinching = false;
    }
    if (e.touches.length === 0) {
      setTimeout(() => { dragging = false; moved = false; }, 50);
    }
  }, { passive: true });
}

function confetti() {
  const colors=['#E05A5A','#7B68EE','#3AAA7A','#E8900A','#FFE000','#fff'];
  for(let i=0;i<35;i++){
    const el=document.createElement('div');
    el.className='conf';
    el.style.cssText=`left:${Math.random()*100}vw;top:-8px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.5}s;animation-duration:${0.8+Math.random()*0.7}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1600);
  }
}
